version: '3.8'

services:
  backend:
    build: .
    container_name: hrc-backend
    ports:
      - "5011:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000 
      - DB_HOST=database
      - DB_PORT=3311 
      - DB_USER=hrc_user
      - DB_PASSWORD=${DB_PASSWORD} # 🔑 Mengambil dari .env
      - DB_NAME=pendaftaran_hrc
      - FRONTEND_URL=https://pendaftaran-hrc-frontendd.vercel.app
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY} # 🔑 Mengambil dari .env
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY} # 🔑 Mengambil dari .env
    depends_on:
      database:
        condition: service_healthy

  database: 
    image: mysql:8.0
    container_name: hrc-database
    ports:
      - "3311:3306" # Port luar 3311 aman digunakan untuk remote (DBeaver/Navicat)
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD} # 🔑 Mengambil dari .env
      - MYSQL_DATABASE=pendaftaran_hrc
      - MYSQL_USER=hrc_user
      - MYSQL_PASSWORD=${DB_PASSWORD} # 🔑 Mengambil dari .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hrc_user", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql_data: