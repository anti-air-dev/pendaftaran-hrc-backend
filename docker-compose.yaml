version: '3.8'

services:
  # Service untuk Backend API kamu
  backend:
    build: .
    container_name: hrc-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=database # Menghubungkan ke service database di bawah
      - DB_PORT=3306     # Port standar MySQL
      - DB_USER=hrc_user
      - DB_PASSWORD=hrc_secret_password
      - DB_NAME=pendaftaran_hrc
    depends_on:
      - database

  # Service untuk Database MySQL
  database:
    image: mysql:8.0
    container_name: hrc-database
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=super_secret_root_password # Password untuk user 'root'
      - MYSQL_DATABASE=pendaftaran_hrc                # Otomatis membuat database ini saat pertama kali jalan
      - MYSQL_USER=hrc_user                            # Membuat user baru
      - MYSQL_PASSWORD=hrc_secret_password            # Password untuk user baru
    volumes:
      - mysql_data:/var/lib/mysql # Agar data MySQL tidak hilang saat container dimatikan

volumes:
  mysql_data: # Menyimpan data database secara lokal di komputer kamu