version: '3.8'

services:
  backend:
    build: .
    container_name: hrc-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=hrc_user
      - DB_PASSWORD=hrc_secret_password
      - DB_NAME=pendaftaran_hrc
    depends_on:
      database:
        condition: service_healthy # Ganti baris ini agar menunggu MySQL sehat

  database:
    image: mysql:8.0
    container_name: hrc-database
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=super_secret_root_password
      - MYSQL_DATABASE=pendaftaran_hrc
      - MYSQL_USER=hrc_user
      - MYSQL_PASSWORD=hrc_secret_password
    volumes:
      - mysql_data:/var/lib/mysql
    # --- Tambahkan blok healthcheck di bawah ini ---
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hrc_user", "-phrc_secret_password"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s # Berikan waktu lebih lama di VPS untuk inisialisasi awal

volumes:
  mysql_data: